    <meta charset="UTF-8">
    <title>成绩查询</title>

    <link rel="stylesheet" type="text/css" href="css/mw_functions.css" />
    <link rel="stylesheet" type="text/css" href="css/rw_functions.css" />
    <link rel="stylesheet" type="text/css" href="css/lrw_ui.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "hf";
        }

        body {
            background-color: #ffffff;
            transition: all 0.3s ease;
            padding: 14px 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主卡片。 */
        .score-container {
            max-width: 1400px;
            width: 100%;
            background: #111317b9;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: all 0.2s ease;
            user-select: none; /* 避免拖动时误选文本。 */
        }

        /* 头部区域。 */
        .header-area {
            padding: 20px 28px 12px 28px;
            border-bottom: 1px solid #2a2e3a;
            background: #0f1117;
        }

        .title {
            font-size: 50px;
            font-weight: 600;
            background: linear-gradient(135deg, #e6e9ff, #b1c3ff);
            color: transparent;
            letter-spacing: -0.3px;
        }

        .sub {
            font-size: 30px;
            color: #7f8fa4;
            margin-top: 6px;
        }

        /* 输入区 */
        .input-zone {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 12px;
            margin-bottom: 6px;
        }

        #ordinp {
            background: #1e222c;
            border: 1px solid #3a3f4b;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 25px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.14s cubic-bezier(0.17, 0.9, 0.4, 0.99);
            backdrop-filter: blur(4px);
        }

            #ordinp:hover {
                background: #2c313d;
                border-color: #113838;
                transform: scale(0.95); /* 悬浮时变小 */
            }

        /* 科目标签栏。 */
        .tabbar {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 7px;
            padding: 12px 24px 0 24px;
            background: #0f1117;
            border-bottom: 1px solid #262a33;
            scrollbar-width: auto;
        }

            .tabbar::-webkit-scrollbar {
                height: 4px;
            }

        .tab-btn {
            background: #191e26;
            border: none;
            padding: 10px 24px;
            font-size: 22.5px;
            font-weight: 500;
            font-family: inherit;
            color: #b9c7d9;
            cursor: pointer;
            transition: all 0.14s cubic-bezier(0.17, 0.9, 0.4, 0.99);
            white-space: nowrap;
            letter-spacing: 0.3px;
            margin-right: 2px;
            backdrop-filter: blur(2px);
        }

            .tab-btn:hover {
                background: #113838;
                color: #f0f3fa;
            }

            .tab-btn.active {
                background: #197e6f;
                color: white;
                box-shadow: 0 -2px 0 #3b82f6 inset;
                font-weight: 500;
            }

        /* 内容主体。 */

        .content-wrapper {
            padding: 28px 30px 38px;
            background: #0f1117;
            transition: all 0.2s;
        }

        /* 所有科目面板初始不可见，输入后渐显。 */
        .panetab {
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s, opacity 0.3s ease;
        }

            .panetab.visible {
                visibility: visible;
                opacity: 1;
            }

        .pane {
            display: none;
            animation: fs 0.25s ease;
        }

            .pane.active-pane {
                display: block;
            }

        @keyframes fs { /* 淡入。 */
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 成绩卡片样式。 */
        .subject-header {
            font-size: 65px;
            font-weight: 700;
            background: linear-gradient(120deg, #d9e2ff, #9bb6ff);
            color: transparent;
            margin-bottom: 20px;
            border-left: 5px solid #0d986e;
            padding-left: 20px;
        }

        .score-big {
            background: #151b24;
            border-radius: 32px;
            padding: 20px 28px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #2a2f3c;
        }

        .score-number {
            font-size: 60px;
            font-weight: 800;
            font-family: "hf";
            letter-spacing: 2px;
        }

        .score-percent {
            font-size: 25px;
            background: #1f2a36;
            padding: 6px 18px;
            border-radius: 60px;
            color: #b9f3ff;
        }

        .rank-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }

        .rank-card {
            background: #131a22;
            border-radius: 24px;
            padding: 18px 16px;
            transition: 0.1s;
            border: 1px solid #252d38;
        }

        .rank-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #8f9bb3;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .rank-value {
            font-size: 30px;
            font-family: "hf";
            word-break: break-word;
        }

        .msc {
            text-align: center;
            padding: 14px 25px;
            font-size: 20px;
            border-top: 1px solid #1e232e;
            color: #5c6e8c;
            background: #0b0e13;
            width: 100%;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-block;
        }

        .protected-badge {
            background: #2c2a2f;
            border-radius: 60px;
            padding: 3px 12px;
            font-size: 0.7rem;
        }

        @media (max-width: 700px) {
            .tab-btn {
                padding: 6px 14px;
                font-size: 0.75rem;
            }

            .score-number {
                font-size: 2rem;
            }

            .rank-value {
                font-size: 1.2rem;
            }

            .content-wrapper {
                padding: 20px 16px;
            }
        }

        /* 进度条组件样式。 */
        .progress-card {
            margin-bottom: 20px;
            background: #1e232e;
            border-radius: 28px;
            padding: 16px 20px;
            border: 1px solid #2a2f3c;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: 500;
            color: #cbd5e6;
        }

        .subject-percent {
            font-family: "hf";
            font-size: 25px;
            font-weight: bold;
            color: #b9f3ff;
        }

        .progress-bar-bg {
            background-color: #2a2f3c;
            border-radius: 40px;
            height: 12px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px #00000030;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 40px;
            transition: width 0.4s cubic-bezier(0.17, 0.9, 0.4, 0.99), background-color 0.3s;
        }
    </style>
</head>

                    let max_ch = parseFloat(c_s[ord].split('/')[1]), max_ma = parseFloat(m_s[ord].split('/')[1]), max_en = parseFloat(e_s[ord].split('/')[1]), max_hi = parseFloat(h_s[ord].split('/')[1]), max_po = parseFloat(p_s[ord].split('/')[1]), max_geo = parseFloat(g_s[ord].split('/')[1]), max_ph = parseFloat(f_s[ord].split('/')[1]), max_chm = parseFloat(k_s[ord].split('/')[1]), max_bio = parseFloat(b_s[ord].split('/')[1]);
                    let total = ch + ma + en + hi + po + geo + ph + chm + bio;
                    let total_max = max_ch + max_ma + max_en + max_hi + max_po + max_geo + max_ph + max_chm + max_bio;
                    return `${total}/${total_max}`;
                },
                dataMap: null
            }
        ];

        let current_ord = null;
        let data_loaded = false;
        let verified = false;

        const tabbar = document.querySelector(".tabbar");
        const panetab = document.querySelector(".panetab");
        const msc = document.querySelector(".msc");

        function start() {
            tabbar.innerHTML = '';
            panetab.innerHTML = '';
            subjects.forEach((sub, idx) => {
                const btn = document.createElement('button');
                btn.className = "tab-btn";
                btn.textContent = sub.key;
                btn.dataset.index = idx;
                btn.addEventListener("click", () => {
                    if (!data_loaded && !verified) return;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active-pane'));
                    const target_pane = document.getElementById(`pane-${idx}`);
                    if (target_pane) target_pane.classList.add('active-pane');
                });
                tabbar.appendChild(btn);

                const pane = document.createElement('div');
                pane.className = 'pane';
                if (idx !== 0) pane.classList.remove('active-pane');
                else pane.classList.add('active-pane');
                pane.id = `pane-${idx}`;
                pane.innerHTML = `
                                    <div class="score-big" id="score_area_${idx}"></div>
                                    <div class="progress-bar-wrapper" style="margin: 10px 0 20px 0;">
                                        <div class="progress-bar-bg">
                                            <div class="progress-fill" id="progress_fill_${idx}" style="width: 0%;"></div>
                                        </div>
                                    </div>
                                    <div id="line_cards_${idx}" class="rank-grid"></div>
                                `;
                panetab.appendChild(pane);
            });
        }

        function upd_bar(idx, s, max) {
            const fill_div = document.getElementById(`progress_fill_${idx}`);
            if (!fill_div) return;
            const ratio = s / max;
            const percent = (ratio * 100);
            fill_div.style.width = `${percent}%`;
            const hue = Math.min(150, Math.max(0, 150 * ratio));
            fill_div.style.backgroundColor = `hsl(${hue}, 70%, 55%)`;
        }

        function linecards(ord, sub) {
            const is_jh = ord.startsWith('jh_');
            const line_keys = is_jh ? ['jh_t0', 'jh_t1', 'jh_t2', 'jh_t3', 'jh_t4', 'jh_t5', 'jh_t6'] : ['sh_t0', 'sh_t1', 'sh_t2', 'sh_t3', 'sh_t4', 'sh_t5', 'sh_t6'];
            const line_names = ['提前批', '第一批', '第二批', '第三批', '第四批', '第五批', "第六批"];

            if (sub.key === "总分") {
                let total_score = parseFloat(sub.res(ord).split('/')[0]);
                let cards = '';
                for (let i = 0; i < line_keys.length; i++) {
                    let line_sum = 0;
                    for (let s of subjects) {
                        if (!s.iscomp && s.dataMap) {
                            let line_str = s.dataMap[line_keys[i]];
                            if (line_str) line_sum += parseFloat(line_str.split('/')[0]);
                        }
                    }
                    let diff_html = sdiff(total_score, line_sum);
                    cards += `
                                <div class="rank-card">
                                    <div class="rank-label">${line_names[i]}</div>
                                    <div class="rank-value" style="font-size:1.2rem;">${line_sum} 分</div>
                                    <div class="small-note" style="margin-top:8px;">${diff_html}</div>
                                </div>
                            `;
                }
                return cards;
            } else if (sub.key === "文综") {
                let total_score = parseFloat(sub.res(ord).split('/')[0]);
                let cards = '';
                const cehpg_keys = ['语文', '英语', '历史', '政治', '地理'];
                for (let i = 0; i < line_keys.length; i++) {
                    let line_sum = 0;
                    for (let s of subjects) {
                        if (!s.iscomp && cehpg_keys.includes(s.key) && s.dataMap) {
                            let line_str = s.dataMap[line_keys[i]];
                            if (line_str) line_sum += parseFloat(line_str.split('/')[0]);
                        }
                    }
                    let diff_html = sdiff(total_score, line_sum);
                    cards += `
                                <div class="rank-card">
                                    <div class="rank-label">${line_names[i]}</div>
                                    <div class="rank-value" style="font-size:1.2rem;">${line_sum} 分</div>
                                    <div class="small-note" style="margin-top:8px;">${diff_html}</div>
                                </div>
                            `;
                }
                return cards;
            } else if (sub.key === "理综") {
                let total_score = parseFloat(sub.res(ord).split('/')[0]);
                let cards = '';
                const mfkb_keys = ['数学', '物理', '化学', '生物'];
                for (let i = 0; i < line_keys.length; i++) {
                    let line_sum = 0;
                    for (let s of subjects) {
                        if (!s.iscomp && mfkb_keys.includes(s.key) && s.dataMap) {
                            let line_str = s.dataMap[line_keys[i]];
                            if (line_str) line_sum += parseFloat(line_str.split('/')[0]);
                        }
                    }
                    let diff_html = sdiff(total_score, line_sum);
                    cards += `
                                <div class="rank-card">
                                    <div class="rank-label">${line_names[i]}</div>
                                    <div class="rank-value" style="font-size:1.2rem;">${line_sum} 分</div>
                                    <div class="small-note" style="margin-top:8px;">${diff_html}</div>
                                </div>
                            `;
                }
                return cards;
            } else {
                let score_val = parseFloat(sub.res(ord).split('/')[0]);
                let cards = '';
                for (let i = 0; i < line_keys.length; i++) {
                    let line_str = sub.dataMap[line_keys[i]];
                    if (line_str) {
                        let line_score = parseFloat(line_str.split('/')[0]);
                        let diff_html = sdiff(score_val, line_score);
                        cards += `
                                    <div class="rank-card">
                                        <div class="rank-label">${line_names[i]}</div>
                                        <div class="rank-value" style="font-size:1.2rem;">${line_score} 分</div>
                                        <div class="small-note" style="margin-top:8px;">${diff_html}</div>
                                    </div>
                                `;
                    }
                }
                return cards;
            }
        }

        function content_score(ord, idx) {
            const sub = subjects[idx];
            if (!sub) return;
            const score_str = sub.res(ord);
            let [s, max] = score_str.split('/').map(v => parseFloat(v));
            const percent = (s / max * 100).toFixed(2);
            const color_style = s2c(s, max);

            const score_area = document.getElementById(`score_area_${idx}`);
            score_area.innerHTML = `
                                <div class="score-number" style="color: ${color_style};">${score_str}</div>
                                <div class="score-percent" style="color: ${color_style};">得分率 ${percent}%</div>
                            `;
            upd_bar(idx, s, max);

            const line_cards_div = document.getElementById(`line_cards_${idx}`);
            line_cards_div.innerHTML = linecards(ord, sub);
        }

        function show_subjects(ord) {
            for (let i = 0; i < subjects.length; i++) {
                content_score(ord, i);
            }
        }

        function v_highscore(ord) {
            if (!ord.startsWith('jh_')) return false;
            const total_subject = subjects.find(s => s.key === '总分');
            const total_str = total_subject.res(ord);
            const total_score = parseFloat(total_str.split('/')[0]);
            return total_score >= 1260;
        }

        function s_highscore(ord) {
            if (!ord) return;
            show_subjects(ord);
            data_loaded = true;
            verified = true;
            const active_idx = document.querySelector('.tab-btn.active')?.dataset.index;
            if (active_idx !== undefined) content_score(ord, parseInt(active_idx));
            msc.style.color = "#5c6e8c";
            msc.innerHTML = "Moshariny Combination";
            msc.style.cursor = "default";
            msc.onclick = null;
        }

        function highscore_placeholder(ord) {
            for (let i = 0; i < subjects.length; i++) {
                const score_area = document.getElementById(`score_area_${i}`);
                const fill_div = document.getElementById(`progress_fill_${i}`);
                const line_cards = document.getElementById(`line_cards_${i}`);
                if (score_area) score_area.innerHTML = `<div class="score-number" style="color:#6c6f7a;">不公布</div><div class="score-percent">不公布</div>`;
                if (fill_div) fill_div.style.width = '0%';
                if (line_cards) line_cards.innerHTML = `<div class="rank-card" style="grid-column:1/-1; text-align:center;">不公布</div>`;
            }
            msc.style.color = "#ffaa66";
            msc.innerHTML = "不公布考生信息";
            msc.style.cursor = "pointer";
            msc.onclick = async () => {
                if (verified) return;
                let submit_code = await inp("请输入准考证号。", "确认");
                if (submit_code === candnum[current_ord]) {
                    s_highscore(current_ord);
                    msc.innerHTML = "Moshariny Combination";
                    msc.style.color = "#87f5a5";
                    msc.onclick = null;
                } else {
                    await fail("准考证号不匹配。");
                }
            };
        }

        async function switch_student(ord) {
            const container = document.querySelector('.panetab');
            if (!container.classList.contains('visible')) {
                container.classList.add('visible');
                container.style.opacity = '1';
                current_ord = ord;
                if (v_highscore(ord)) {
                    highscore_placeholder(ord);
                    data_loaded = false;
                    verified = false;
                } else {
                    s_highscore(ord);
                    verified = true;
                    data_loaded = true;
                }
                return;
            }
            container.style.transition = 'opacity 0.2s ease';
            container.style.opacity = '0';
            await new Promise(resolve => setTimeout(resolve, 200));
            current_ord = ord;
            rz(`当前正在阅览${ord.includes('t') ? '分数线' : ' ' + ord + ' '}的成绩！`);
            if (v_highscore(ord)) {
                highscore_placeholder(ord);
                data_loaded = false;
                verified = false;
            } else {
                s_highscore(ord);
                verified = true;
                data_loaded = true;
            }
            container.style.opacity = '1';
            setTimeout(() => {
                if (container.style.transition) container.style.transition = '';
            }, 200);
        }

        async function init(ord) {
            const container = document.querySelector('.panetab');
            if (!container.classList.contains('visible')) {
                container.classList.add('visible');
                container.style.opacity = '1';
                current_ord = ord;
                document.title = `${ord} 的成绩`;
                rz(`当前正在阅览${ord.includes('t') ? '分数线' : ' ' + ord + ' '}的成绩！`);

                if (v_highscore(ord)) {
                    highscore_placeholder(ord);
                    data_loaded = false;
                    verified = false;
                } else {
                    s_highscore(ord);
                    verified = true;
                    data_loaded = true;
                }
            } else {
                await switch_student(ord);
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            start();
            const panetab = document.querySelector('.panetab');
            panetab.classList.remove('visible');
            panetab.style.opacity = '0';

            const ordinp = document.getElementById("ordinp");
            ordinp.onclick = async () => {
                let user_ord = await inp("输入考生编号。");
                if (!user_ord) return;
                if ((!user_ord.startsWith("jh_") && !user_ord.startsWith("sh_"))) {
                    await fail("编号必须以 jh_ 或 sh_ 开头，请重新输入。");
                    return;
                }
                if (!c_s[user_ord]) {
                    await fail("此考生编号不存在，请检查后重新输入。");
                    return;
                }
                await init(user_ord);
            };

            setTimeout(() => {
                document.body.style.backgroundColor = "#111317";
            }, 10);
        });
    </script>
</body>
</html>
